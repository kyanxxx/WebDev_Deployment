services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cafe_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cafe_root_db}
      MYSQL_USER: ${MYSQL_USER:-cafe_root_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cafe_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cafe_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-cafe_root_password}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8089:80"
    env_file:
      - .env
    environment:
      # Always prod in Docker (dev bundles are not installed in the image)
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: ${APP_SECRET:-change_me_in_production}
      DATABASE_URL: mysql://${MYSQL_USER:-cafe_root_user}:${MYSQL_PASSWORD:-cafe_password}@mysql:3306/${MYSQL_DATABASE:-cafe_root_db}?serverVersion=8.0.32&charset=utf8mb4
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default?auto_setup=0}
      MAILER_DSN: ${MAILER_DSN:-null://null}
      MAILER_FROM_ADDRESS: ${MAILER_FROM_ADDRESS:-noreply@example.com}
      MAILER_FROM_NAME: ${MAILER_FROM_NAME:-Harvey's Cafe}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-'^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-%kernel.project_dir%/config/jwt/private.pem}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-%kernel.project_dir%/config/jwt/public.pem}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
    volumes:
      - app_var:/var/www/html/var
      - jwt_keys:/var/www/html/config/jwt
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cafe_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-cafe_root_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-cafe_password}
      PMA_ARBITRARY: 1
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cafe_network

volumes:
  mysql_data:
  app_var:
  jwt_keys:

networks:
  cafe_network:
