security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        App\Entity\User:
            algorithm: auto

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api_platform:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login
                username_path: username
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\LoginAuthenticator
                - App\Security\GoogleAuthenticator
            user_checker: App\Security\UserChecker
            logout:
                path: app_logout
                # where to redirect after logout
                target: app_login

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                # by default, the feature is enabled by checking a checkbox in the
                # login form, uncomment the following line to always enable it.
                #always_remember_me: true
            # no custom authenticator, just basic access

    # Easy way to control access for large sections of your site
    access_control:
        # Public routes (accessible to everyone, including unauthenticated)
        
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/login/google, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED }
        
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google/check, roles: PUBLIC_ACCESS }
        - { path: ^/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/landing, roles: PUBLIC_ACCESS }
        
        # Admin and Staff routes
        - { path: ^/admin, roles: [ROLE_ADMIN, ROLE_STAFF] }
        
        # Products routes (accessible to all authenticated users)
        - { path: ^/products, roles: ROLE_USER }
        # Orders routes (only for staff and admin)
        - { path: ^/orders, roles: [ROLE_ADMIN, ROLE_STAFF] }
        
        # Customer routes (accessible to all authenticated users)
        - { path: ^/customer, roles: ROLE_USER }
        
        # All other routes require authentication
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
